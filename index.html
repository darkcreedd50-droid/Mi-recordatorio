<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recordatorio Total</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; text-align: center; padding: 20px; }
        .box { background: #34495e; padding: 20px; border-radius: 15px; border: 2px solid #3498db; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; font-size: 16px; }
        button { width: 90%; padding: 15px; background: #e74c3c; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; }
        #vibrar { margin-top: 20px; color: #f1c40f; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="box">
    <h2>⏰ AVISO URGENTE</h2>
    <input type="text" id="tarea" placeholder="¿Qué hay que hacer?">
    <input type="datetime-local" id="cuando">
    <button onclick="fijar()">CONFIGURAR AHORA</button>
    <div id="vibrar">⚠️ ¡TIENES UNA TAREA PENDIENTE!</div>
</div>

<script>
    function fijar() {
        const t = document.getElementById('tarea').value;
        const c = document.getElementById('cuando').value;
        if(!t || !c) return alert("Pon fecha y tarea");
        
        localStorage.setItem('urgente_t', t);
        localStorage.setItem('urgente_c', c);
        alert("¡Listo! No cierres la pestaña del todo, déjala abierta.");
    }

    setInterval(function() {
        const ahora = new Date().getTime();
        const meta = new Date(localStorage.getItem('urgente_c')).getTime();
        const texto = localStorage.getItem('urgente_t');

        if(meta && ahora >= meta) {
            // Este es el aviso que no falla: un cuadro en pantalla
            alert("🚨 ¡ATENCIÓN!: " + texto);
            document.getElementById('vibrar').style.display = "block";
        }
    }, 10000); // Revisa cada 10 segundos
</script>

</body>
</html>
